<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>IRICHMAN Club</title>
		<script src="https://telegram.org/js/telegram-web-app.js"></script>
		<script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
		<style>
			:root {
				--bg: var(--tg-theme-bg-color, #fff);
				--text: var(--tg-theme-text-color, #000);
				--btn: var(--tg-theme-button-color, #3390ec);
				--btn-text: var(--tg-theme-button-text-color, #fff);
			}
			body {
				font-family: -apple-system, BlinkMacSystemFont, sans-serif;
				background: var(--bg);
				color: var(--text);
				margin: 0;
				padding: 24px 16px;
				text-align: center;
			}
			h1 {
				margin: 0 0 8px;
				font-size: 24px;
			}
			p {
				opacity: 0.7;
				margin: 0 0 16px;
			}
			.wallet-box {
				background: rgba(128, 128, 128, 0.1);
				padding: 10px;
				border-radius: 10px;
				margin: 12px 0;
				font-family: monospace;
				font-size: 12px;
				word-break: break-all;
			}
			.btn {
				background: var(--btn);
				color: var(--btn-text);
				border: none;
				padding: 14px;
				border-radius: 12px;
				font-size: 16px;
				font-weight: 500;
				cursor: pointer;
				width: 100%;
				margin-bottom: 10px;
			}
			.btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			#status {
				font-size: 14px;
				margin-top: 6px;
				opacity: 0.8;
				min-height: 20px;
			}
			.hidden {
				display: none;
			}
		</style>
		<!-- rebuild: 2026-05-07 -->
	</head>
	<body>
		<h1>👑 IRICHMAN</h1>
		<p>Тестовый NFT-клуб | Sandbox</p>
		<div id="connect-btn-container"></div>
		<div id="post-wallet" class="hidden">
			<div class="wallet-box" id="wallet-addr">Адрес не определён</div>
			<button class="btn" id="mint-btn">
				🎨 Отчеканить NFT (0.05 TON)
			</button>
			<div id="status">Ожидание...</div>
		</div>
		<script>
			const tg = window.Telegram.WebApp
			tg.expand()
			tg.ready()
			const API_URL = 'http://localhost:3000/api'
			const postWallet = document.getElementById('post-wallet')
			const walletAddrDiv = document.getElementById('wallet-addr')
			const statusDiv = document.getElementById('status')
			const mintBtn = document.getElementById('mint-btn')
			const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
				manifestUrl:
					'https://lss88.github.io/irichman-club/manifest.json',
				buttonRootId: 'connect-btn-container',
			})
			tonConnectUI.onStatusChange(wallet => {
				if (wallet) {
					postWallet.classList.remove('hidden')
					const addr = wallet.account.address
					walletAddrDiv.textContent = `🟢 ${addr.slice(0, 6)}...${addr.slice(-6)}`
					statusDiv.textContent = '✅ Подключено'
				} else {
					postWallet.classList.add('hidden')
					statusDiv.textContent = 'Кошелёк отключён'
				}
			})
			mintBtn.addEventListener('click', async () => {
				if (!tonConnectUI.connected)
					return tg.showAlert('Сначала подключи кошелёк')
				mintBtn.disabled = true
				statusDiv.textContent = '⏳ Чеканка...'
				try {
					const response = await fetch(`${API_URL}/mint`, {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({
							userAddress: tonConnectUI.wallet.account.address,
						}),
					})
					const result = await response.json()
					if (result.success) {
						statusDiv.textContent = `✅ NFT отчеканен! Всего: ${result.totalMinted}`
						tg.showPopup({
							title: '🎉 Добро пожаловать!',
							message: `Ты стал членом клуба IRICHMAN!\nNFT #${result.totalMinted}`,
						})
					} else {
						statusDiv.textContent = `❌ Ошибка: ${result.error || 'Неизвестная'}`
					}
				} catch (err) {
					statusDiv.textContent = '⚠️ Проверь, что запущен server.js'
					console.error(err)
				} finally {
					mintBtn.disabled = false
				}
			})
		</script>
	</body>
</html>
