<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>IRICHMAN Club</title>
		<script src="https://telegram.org/js/telegram-web-app.js"></script>
		<!-- TON Connect UI -->
		<script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
		<style>
			:root {
				--bg: var(--tg-theme-bg-color, #fff);
				--text: var(--tg-theme-text-color, #000);
				--btn-bg: var(--tg-theme-button-color, #3390ec);
				--btn-text: var(--tg-theme-button-text-color, #fff);
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
					sans-serif;
				background: var(--bg);
				color: var(--text);
				margin: 0;
				padding: 24px 16px;
				text-align: center;
			}
			h1 {
				font-size: 24px;
				margin: 0 0 8px;
			}
			p {
				opacity: 0.7;
				margin: 0 0 16px;
			}
			.wallet-info {
				background: rgba(128, 128, 128, 0.1);
				padding: 12px;
				border-radius: 12px;
				margin: 16px 0;
				font-size: 13px;
				word-break: break-all;
				font-family: monospace;
			}
			.btn {
				background: var(--btn-bg);
				color: var(--btn-text);
				border: none;
				padding: 14px 28px;
				border-radius: 12px;
				font-size: 16px;
				font-weight: 500;
				cursor: pointer;
				width: 100%;
				margin-bottom: 12px;
			}
			#connect-btn-container {
				min-height: 48px;
				margin-bottom: 12px;
			}
			#status {
				font-size: 14px;
				margin-top: 8px;
				opacity: 0.75;
			}
			.hidden {
				display: none;
			}
		</style>
	</head>
	<body>
		<h1>👑 IRICHMAN</h1>
		<p>Тестовый NFT-клуб | TON Testnet</p>

		<!-- Сюда TON Connect сам вставит кнопку -->
		<div id="connect-btn-container"></div>

		<div id="post-wallet" class="hidden">
			<div class="wallet-info" id="wallet-address">
				Адрес не определён
			</div>
			<button class="btn" id="mint-btn">🎨 Отчеканить NFT</button>
			<button class="btn" style="background: #555" id="check-btn">
				🔍 Проверить владение
			</button>
			<div id="status">Ожидание действия...</div>
		</div>

		<script>
			const tg = window.Telegram.WebApp
			tg.expand()
			tg.ready()

			const postWallet = document.getElementById('post-wallet')
			const walletAddressDiv = document.getElementById('wallet-address')
			const statusDiv = document.getElementById('status')
			const mintBtn = document.getElementById('mint-btn')
			const checkBtn = document.getElementById('check-btn')

			// 1. Инициализация TON Connect UI
			const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
				manifestUrl:
					'https://lss88.github.io/irichman-club/manifest.json',
				buttonRootId: 'connect-btn-container',
			})

			// 2. Реагируем на изменение статуса кошелька
			tonConnectUI.onStatusChange(wallet => {
				if (wallet) {
					postWallet.classList.remove('hidden')
					const addr = wallet.account.address
					walletAddressDiv.textContent = `🟢 ${addr.slice(0, 6)}...${addr.slice(-6)}`
					statusDiv.textContent = '✅ Подключено к Testnet'
				} else {
					postWallet.classList.add('hidden')
					statusDiv.textContent = 'Кошелёк отключён'
				}
			})

			// 3. Заглушки для следующих шагов
			mintBtn.addEventListener('click', () => {
				tg.showPopup({
					title: '🚧 Шаг 4',
					message: 'Скоро подключим смарт-контракт для чеканки NFT.',
				})
			})
			checkBtn.addEventListener('click', () => {
				tg.showPopup({
					title: '🔍 Проверка',
					message: 'Баланс NFT: 0 | Статус: Не в клубе',
				})
			})
		</script>
	</body>
</html>
