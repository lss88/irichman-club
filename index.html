<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>IRICHMAN Club</title>
		<script src="https://telegram.org/js/telegram-web-app.js"></script>
		<style>
			:root {
				--bg: var(--tg-theme-bg-color, #fff);
				--text: var(--tg-theme-text-color, #000);
				--btn-bg: var(--tg-theme-button-color, #3390ec);
				--btn-text: var(--tg-theme-button-text-color, #fff);
			}
			body {
				font-family:
					-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
					sans-serif;
				background: var(--bg);
				color: var(--text);
				margin: 0;
				padding: 24px 16px;
				text-align: center;
			}
			h1 {
				font-size: 24px;
				margin: 0 0 8px;
			}
			p {
				opacity: 0.7;
				margin: 0 0 24px;
			}
			.btn {
				background: var(--btn-bg);
				color: var(--btn-text);
				border: none;
				padding: 14px 28px;
				border-radius: 12px;
				font-size: 16px;
				font-weight: 500;
				cursor: pointer;
				width: 100%;
				margin-bottom: 12px;
			}
			.btn:active {
				opacity: 0.85;
			}
			#status {
				font-size: 14px;
				margin-top: 8px;
				opacity: 0.75;
			}
			.hidden {
				display: none;
			}
		</style>
	</head>
	<body>
		<h1>👑 IRICHMAN</h1>
		<p>Тестовый NFT-клуб | TON Testnet</p>

		<div id="pre-wallet">
			<button class="btn" id="connect-btn">🔗 Подключить кошелёк</button>
		</div>

		<div id="post-wallet" class="hidden">
			<button class="btn" id="mint-btn">🎨 Отчеканить NFT</button>
			<button class="btn" style="background: #555" id="check-btn">
				🔍 Проверить владение
			</button>
			<div id="status">Ожидание действия...</div>
		</div>

		<script>
			const tg = window.Telegram.WebApp
			tg.expand()
			tg.ready()

			const connectBtn = document.getElementById('connect-btn')
			const mintBtn = document.getElementById('mint-btn')
			const checkBtn = document.getElementById('check-btn')
			const statusDiv = document.getElementById('status')
			const preWallet = document.getElementById('pre-wallet')
			const postWallet = document.getElementById('post-wallet')

			// Заглушка подключения кошелька (реализуем в Шаге 3)
			connectBtn.addEventListener('click', () => {
				statusDiv.textContent = '⏳ Подключение...'
				setTimeout(() => {
					preWallet.classList.add('hidden')
					postWallet.classList.remove('hidden')
					statusDiv.textContent = '🟢 Кошелёк подключён (тест)'
				}, 1200)
			})

			mintBtn.addEventListener('click', () => {
				tg.showPopup({
					title: '🚧 Скоро',
					message:
						'В Шаге 4 мы подключим реальный смарт-контракт для чеканки NFT в Testnet.',
				})
			})

			checkBtn.addEventListener('click', () => {
				tg.showPopup({
					title: '🔍 Проверка',
					message: 'Баланс NFT: 0 | Статус: Не в клубе',
				})
			})
		</script>
	</body>
</html>
